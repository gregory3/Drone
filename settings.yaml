# AI Grand Prix — Master Configuration
# All tuneable parameters live here. Never hardcode values in source files.

drone:
  max_speed_mps: 3.0          # Conservative Phase 1 cap (raise in Phase 3)
  max_accel_mps2: 4.0
  approach_speed_mps: 1.5     # Speed used when flying toward a detected gate
  through_speed_mps: 2.5      # Speed maintained passing through gate center
  recovery_speed_mps: 1.0     # Speed during lost-gate recovery maneuver

perception:
  # Camera spec matches the Elodin AI Grand Prix practice rig and the
  # competition VADR-TS-002 reference: 640x360 forward FPV, ~90 deg HFOV,
  # pitched +20 deg above horizontal.
  camera_fov_deg: 90.0
  camera_tilt_deg: 20.0
  image_width: 640
  image_height: 360
  gate_min_area_px: 400       # Minimum contour area to count as a gate candidate
  gate_max_area_px: 180000
  gate_confidence_threshold: 0.55
  detection_history_frames: 20 # Frames to hold a gate prediction when lost (ride through brief dropouts before recovery)
  temporal_smoothing_frames: 4 # Smooth gate detections across recent frames
  temporal_smoothing_miss_tolerance: 2 # Keep last smoothed detection for short dropouts
  detection_max_center_jump_px: 120 # Reject inconsistent detections from history

  # HSV color ranges for Round 1 highlighted gates (tune in sim).
  # Primary range = orange. Round-1 gates in the official sim render RED, which
  # wraps the hue boundary, so two extra ranges (low + high hue) cover red.
  # First-pass red values — sample a real frame on the rig to nail them.
  gate_hsv_lower: [15, 80, 80]
  gate_hsv_upper: [40, 255, 255]
  gate_hsv_lower2: [0, 110, 70]      # red, low-hue side
  gate_hsv_upper2: [10, 255, 255]
  gate_hsv_lower3: [170, 110, 70]    # red, high-hue side (wrap)
  gate_hsv_upper3: [179, 255, 255]

  # Round 2 / neural detector (YOLO-family, swapped in via config)
  detector_backend: "classical"   # "classical" | "onnx"
  onnx_model_path: "perception/models/gate_detector.onnx"
  onnx_input_size: [640, 640]

state_estimation:
  ekf_process_noise_pos: 0.01
  ekf_process_noise_vel: 0.1
  ekf_measurement_noise_imu: 0.05
  ekf_measurement_noise_vision: 0.2
  imu_dt: 0.004               # 250 Hz IMU
  vision_dt: 0.033             # ~30 Hz camera

planning:
  gate_approach_distance_m: 1.5   # How far in front of gate to start final alignment
  gate_through_offset_m: 0.8      # How far past the gate center to target for a clean pass
  gate_pass_plane_dist_m: 0.2     # Signed distance beyond gate plane to count as passed
  waypoint_tolerance_m: 0.3       # Distance at which a waypoint is considered reached
  lookahead_gates: 2              # How many gates ahead to pre-plan
  recovery_search_yaw_rate: 15.0  # deg/s yaw sweep when gate is lost (gentler so a brief loss doesn't spin away)
  recovery_climb_m: 0.3           # Slight altitude gain during recovery
  recovery_resume_confirm_frames: 2  # Frames of stable detection required to exit recovery
  takeoff_duration_s: 1.0         # Lift off the pad (~2.5m), then resume gate-following with gate 0 in view
  takeoff_climb_mps: 2.5          # Commanded climb rate during takeoff (NED up)

control:
  # PID gains — position loop (outer)
  pos_kp: [1.2, 1.2, 1.5]
  pos_ki: [0.01, 0.01, 0.02]
  pos_kd: [0.4, 0.4, 0.5]

  # PID gains — velocity loop (inner)
  vel_kp: [2.0, 2.0, 2.5]
  vel_ki: [0.05, 0.05, 0.08]
  vel_kd: [0.1, 0.1, 0.15]

  max_tilt_deg: 35.0
  max_yaw_rate_dps: 120.0
  control_hz: 50               # Main control loop frequency

  # MAVLink control backend (official AI-GP sim runs ACRO/rate mode, so
  # velocity setpoints are ignored — must command body rates + thrust).
  mavlink_control_mode: "attitude"   # "attitude" (ACRO sim) | "velocity" (GUIDED sim)
  att_tilt_per_mps_deg: 4.5    # desired tilt angle per m/s of demanded body velocity (forward authority vs keeping gate in frame)
  att_rate_kp: 5.0             # body-rate (rad/s) per rad of attitude error
  att_max_rate_dps: 400.0      # body-rate command clamp
  hover_thrust: 0.32           # collective thrust to hover (0..1); takeoff threshold ~0.3-0.35 on the AI-GP sim
  thrust_kp_climb: 0.12        # thrust per (m/s) of desired climb rate (enough to lift off)
  thrust_kd_climb: 0.08        # thrust damping per (m/s) of actual climb rate
  thrust_min: 0.1
  thrust_max: 0.6             # safety cap during tuning (drone is very powerful)

telemetry:
  log_dir: "logs"
  log_level: "DEBUG"           # DEBUG | INFO | WARNING
  flush_interval_s: 1.0
  max_log_size_mb: 200
  enable_frame_logging: true   # Save annotated frames alongside flight log
  frame_log_hz: 10             # Log frames at this rate (subset of camera rate)

sim:
  host: "127.0.0.1"
  port: 5760
  mavlink_port: 14550          # AI-GP sim (FlightSim.exe) MAVLink UDP port
  vision_port: 5600            # AI-GP sim camera JPEG stream UDP port
  connect_timeout_s: 10.0
  camera_dead_timeout_s: 2.5   # Abort run if camera frames are black this long (sim camera died)
  step_hz: 50                  # How fast we tick the main loop
  mock_use_course: true         # Use the mock course positions when in mock mode
  mock_use_ground_truth: true  # When true, mock sim uses perfect ground truth for state
