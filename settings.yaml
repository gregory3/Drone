# AI Grand Prix — Master Configuration
# All tuneable parameters live here. Never hardcode values in source files.

drone:
  # Speed caps are now a confidence-scaled curve (see speed_confidence_*). These
  # are the CEILINGS hit only at high detection confidence; low confidence slides
  # the cap down toward recovery_speed_mps. Raised modestly from the fly16-era
  # values now that perception-aware yaw keeps the gate in frame — push higher on
  # the rig once the real ACRO tune is confirmed (mock integrates velocity
  # directly, so mock lap time over-rewards raw speed).
  max_speed_mps: 2.8          # Absolute ceiling
  max_accel_mps2: 4.0
  approach_speed_mps: 2.0     # Ceiling while flying toward a detected gate (was 1.5)
  through_speed_mps: 2.5      # Ceiling passing through the gate (was 2.0)
  recovery_speed_mps: 1.0     # Speed during lost-gate recovery maneuver
  # Confidence -> speed authority (Swift principle: fast when certain, cautious
  # when not). Below the floor, cap = recovery_speed; at/above the ceil, cap =
  # full phase speed; linear in between.
  speed_confidence_floor: 0.4
  speed_confidence_ceil: 0.85

perception:
  # Camera spec matches the Elodin AI Grand Prix practice rig and the
  # competition VADR-TS-002 reference: 640x360 forward FPV, ~90 deg HFOV,
  # pitched +20 deg above horizontal.
  camera_fov_deg: 90.0
  camera_tilt_deg: 20.0
  image_width: 640
  image_height: 360
  gate_real_size_m: 2.7        # OUTER gate frame width (VADR-TS-002 §3.7); the red
                               # contour bbox spans the outer frame. Inner flyable
                               # opening is 1.5m. Drives monocular distance estimates.
  gate_min_area_px: 400       # Minimum contour area to count as a gate candidate
  gate_max_area_px: 180000
  gate_confidence_threshold: 0.55
  detection_history_frames: 5  # Frames the MAIN loop holds a stale detection on a brief dropout.
                               # Lowered from 20: at 50Hz, 20 frames = 0.4s of flying toward a
                               # gate that may already be behind us. The temporal smoother
                               # (temporal_smoothing_miss_tolerance) already rides short dropouts.
  recovery_trigger_frames: 18  # Missed frames before the RECOVERY behaviour engages. Decoupled
                               # from detection_history_frames so shrinking the stale-hold above
                               # doesn't make recovery hair-trigger (was implicitly 20).
  temporal_smoothing_frames: 4 # Smooth gate detections across recent frames
  temporal_smoothing_miss_tolerance: 2 # Keep last smoothed detection for short dropouts
  detection_max_center_jump_px: 120 # Reject inconsistent detections from history

  # Gate selection policy when several gates are visible at once (the course
  # stacks gates along the line, especially after a turn). Swift/MonoRace both
  # target the NEXT gate in sequence, which in onboard view is the nearest one.
  # "nearest" = pick the largest apparent gate (closest); "confidence" = legacy
  # highest-confidence pick (jumps to far gates — caused fly13 veer-off).
  gate_select: "nearest"          # "nearest" | "confidence"
  # Start-light rejection: the sim renders gates as SOLID red squares (same hue
  # as the start light), so colour/fill can't separate them. The start light's
  # tell is its GREEN twin right beside the red blob; gates have none. Reject a
  # red candidate that has a comparable green blob adjacent (fly16: the detector
  # chased the red/green start light at conf 0.76 and the drone flew off).
  gate_reject_green_twin: true
  green_hsv_lower: [40, 80, 80]
  green_hsv_upper: [90, 255, 255]
  # Once locked onto a gate, keep tracking THAT gate frame-to-frame by spatial
  # continuity (nearest blob to last position) instead of re-grabbing the
  # highest-confidence blob. Stops the lurch to a far gate mid-approach.
  gate_track_continuity: true

  # HSV color ranges for Round 1 highlighted gates (tune in sim).
  # Primary range = orange. Round-1 gates in the official sim render RED, which
  # wraps the hue boundary, so two extra ranges (low + high hue) cover red.
  # First-pass red values — sample a real frame on the rig to nail them.
  gate_hsv_lower: [15, 80, 80]
  gate_hsv_upper: [40, 255, 255]
  # Saturation floor 50 (was 110) + high-hue wrap from 160 (was 170): the sim's
  # gate-highlight pulse desaturates the red toward pink (measured S~98, some
  # pixels at H 140-169 in fly15 f00600), which dropped the mask below min-area
  # every ~15s ON A STATIC SCENE. Offline sweep over 374 fly15 pad frames:
  # gate blob available 80.5% -> 94.1% with these ranges.
  gate_hsv_lower2: [0, 50, 70]       # red, low-hue side
  gate_hsv_upper2: [10, 255, 255]
  gate_hsv_lower3: [160, 50, 70]     # red/pink, high-hue side (wrap)
  gate_hsv_upper3: [179, 255, 255]

  # Round 2 / neural detector (YOLO-family, swapped in via config)
  detector_backend: "classical"   # "classical" | "onnx"
  onnx_model_path: "perception/models/gate_detector.onnx"
  onnx_input_size: [640, 640]

state_estimation:
  ekf_process_noise_pos: 0.01
  ekf_process_noise_vel: 0.1
  ekf_measurement_noise_imu: 0.05
  ekf_measurement_noise_vision: 0.2
  imu_dt: 0.004               # 250 Hz IMU
  vision_dt: 0.033             # ~30 Hz camera

planning:
  gate_approach_distance_m: 1.5   # How far in front of gate to start final alignment
  gate_through_offset_m: 1.5      # How far past the gate center to target for a clean pass.
                                  # Raised from 0.8 so the through-target sits clearly
                                  # past the gate plane -> reliably trips the plane-cross pass check.
  gate_pass_plane_dist_m: 0.2     # Signed distance beyond gate plane to count as passed
  waypoint_tolerance_m: 0.3       # Distance at which a waypoint is considered reached
  lookahead_gates: 2              # How many gates ahead to pre-plan
  recovery_search_yaw_rate: 15.0  # deg/s yaw sweep when gate is lost (gentler so a brief loss doesn't spin away)
  gate_yaw_kp_dps: 60.0           # Perception-aware yaw: deg/s of yaw per unit of gate horizontal offset (gate at frame edge -> ~60 deg/s turn to recenter). Keeps the gate in FOV through turns (Swift r_perc as a control law).
  recovery_climb_m: 0.3           # Slight altitude gain during recovery
  recovery_resume_confirm_frames: 2  # Frames of stable detection required to exit recovery
  # Vision-only gate-pass detection (used when no global course/map is available,
  # i.e. the live AI-GP MAVLink sim). A gate that grows large + centered then is
  # lost means we flew through it -> advance to the next gate. Mirrors how
  # Swift/MonoRace step through the gate sequence.
  gate_pass_area_frac: 0.10       # Apparent gate area / image area to count as "close"
  gate_pass_center_frac: 0.40     # |pixel offset| / image dim to count as "centered"
  takeoff_duration_s: 1.0         # Lift off the pad (~2.5m), then resume gate-following with gate 0 in view
  takeoff_climb_mps: 2.5          # Commanded climb rate during takeoff (NED up)

control:
  # PID gains — position loop (outer)
  pos_kp: [1.2, 1.2, 1.5]
  pos_ki: [0.01, 0.01, 0.02]
  pos_kd: [0.4, 0.4, 0.5]

  # PID gains — velocity loop (inner)
  vel_kp: [2.0, 2.0, 2.5]
  vel_ki: [0.05, 0.05, 0.08]
  vel_kd: [0.1, 0.1, 0.15]

  max_tilt_deg: 35.0
  max_yaw_rate_dps: 120.0
  control_hz: 50               # Main control loop frequency

  # MAVLink control backend (official AI-GP sim runs ACRO/rate mode, so
  # velocity setpoints are ignored — must command body rates + thrust).
  mavlink_control_mode: "attitude"   # "attitude" (ACRO sim) | "velocity" (GUIDED sim)
  att_tilt_per_mps_deg: 4.5    # desired tilt angle per m/s of demanded body velocity (forward authority vs keeping gate in frame)
  att_rate_kp: 2.0             # body-rate (rad/s) per rad of attitude error.
                               # attitude_sysid measured the plant following rate
                               # commands with ~2x gain AND momentum (rotation
                               # continues ~10 deg after the command stops), so the
                               # old 5.0 left no stability margin. Effective loop
                               # gain ~4 with lag; raise carefully on the rig only.
  att_max_rate_dps: 180.0      # body-rate command clamp. 400 let the loop slam the
                               # drone through full flips; the 2x-gain laggy plant
                               # turns big rate commands into uncontrolled tumbles.
  hover_thrust: 0.27           # collective thrust to hold altitude (measured ~0.26 on the AI-GP sim). Was 0.32 -> drone climbed the whole flight, gates fell below the 20deg-up camera, flew out of bounds -> DSQ. Takeoff lift comes from the climb term + takeoff phase, NOT from over-trimming hover.
  thrust_kp_climb: 0.12        # thrust per (m/s) of desired climb rate (enough to lift off)
  thrust_kd_climb: 0.08        # thrust damping per (m/s) of actual climb rate
  thrust_min: 0.1
  thrust_max: 0.85           # Raised from 0.6: tuning is over. Hard race maneuvers
                             # need near-full collective authority or the drone sinks
                             # and clips gates. hover_thrust should be set by
                             # tools/calibrate_hover.py, not guessed.

telemetry:
  log_dir: "logs"
  log_level: "DEBUG"           # DEBUG | INFO | WARNING
  flush_interval_s: 1.0
  max_log_size_mb: 200
  enable_frame_logging: true   # Save annotated frames alongside flight log
  frame_log_hz: 10             # Log frames at this rate (subset of camera rate)

sim:
  host: "127.0.0.1"
  port: 5760
  mavlink_port: 14550          # AI-GP sim (FlightSim.exe) MAVLink UDP port
  vision_port: 5600            # AI-GP sim camera JPEG stream UDP port
  connect_timeout_s: 60.0      # Wait long enough to navigate the sim menus (DSQ -> FLY -> pre-flight) before giving up on the heartbeat
  camera_dead_timeout_s: 2.5   # Abort run if camera frames are black this long (sim camera died)
  step_hz: 50                  # How fast we tick the main loop
  mock_use_course: true         # Use the mock course positions when in mock mode
  mock_use_ground_truth: true  # When true, mock sim uses perfect ground truth for state
