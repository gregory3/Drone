[pytest]
# Only collect the real test suite. The gitignored tools/ dir holds live-sim
# probes (e.g. tools_motion_test.py) that match pytest's *_test.py pattern,
# connect to a running FlightSim.exe, and spawn rx threads that wedge/SystemExit
# at teardown. Scope collection to tests/ so `pytest` is deterministic whether
# or not the sim is running.
testpaths = tests
norecursedirs = tools logs "PLTR Drone Package" .venv* __pycache__
